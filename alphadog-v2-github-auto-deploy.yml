name: AlphaDog v2 Mobile Auto Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_scope:
        description: "Deploy scope"
        required: true
        default: "changed"
        type: choice
        options:
          - changed
          - all
          - control-room
          - orchestrator

permissions:
  contents: read

concurrency:
  group: alphadog-v2-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      ALPHADOG_ADMIN_TOKEN: ${{ secrets.ALPHADOG_ADMIN_TOKEN }}
      ALPHADOG_INTERNAL_TOKEN: ${{ secrets.ALPHADOG_INTERNAL_TOKEN }}

      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      PARLAY_API_KEY: ${{ secrets.PARLAY_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      ALPHADOG_WORKER_GITHUB_TOKEN: ${{ secrets.ALPHADOG_WORKER_GITHUB_TOKEN }}
      GITHUB_OWNER_VALUE: ${{ vars.GITHUB_OWNER_VALUE || 'Rodantmat' }}
      GITHUB_REPO_VALUE: ${{ vars.GITHUB_REPO_VALUE || 'Alphadog' }}
      GITHUB_BRANCH_VALUE: ${{ vars.GITHUB_BRANCH_VALUE || 'main' }}
      GITHUB_PRIZEPICKS_PATH_VALUE: ${{ vars.GITHUB_PRIZEPICKS_PATH_VALUE || 'prizepicks_mlb_current.json' }}
      MLB_API_USER_AGENT_VALUE: ${{ vars.MLB_API_USER_AGENT_VALUE || 'AlphaDog-v2/1.0 contact=Alphadog' }}

      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      OPEN_WEATHER_API_KEY: ${{ secrets.OPEN_WEATHER_API_KEY }}
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
      WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}

      DEPLOY_SCOPE: ${{ github.event.inputs.deploy_scope || 'changed' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Wrangler
        run: npm install -D wrangler

      - name: Validate required GitHub secrets
        shell: bash
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
          test -n "$ALPHADOG_ADMIN_TOKEN" || (echo "Missing ALPHADOG_ADMIN_TOKEN" && exit 1)
          test -n "$ALPHADOG_INTERNAL_TOKEN" || (echo "Missing ALPHADOG_INTERNAL_TOKEN" && exit 1)

      - name: Create Worker secrets file safely
        run: python github_write_worker_secrets_file.py

      - name: Regenerate Wrangler configs
        run: python generate_wrangler_configs.py

      - name: Deploy selected Workers
        run: python github_mobile_deploy_workers.py --scope "$DEPLOY_SCOPE"

      - name: Remove generated secret file
        if: always()
        shell: bash
        run: rm -f .alphadog_worker_secrets.json
