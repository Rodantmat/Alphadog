name: MLB Automatic Scraper

on:
  repository_dispatch:
    types: [alphadog_prizepicks_board]
  workflow_dispatch:
    inputs:
      dispatch_id:
        description: 'AlphaDog orchestrator dispatch/request id'
        required: false
        type: string
      request_id:
        description: 'AlphaDog request id fallback'
        required: false
        type: string
      chain_id:
        description: 'AlphaDog chain id'
        required: false
        type: string
      slate_date:
        description: 'Requested slate date YYYY-MM-DD'
        required: false
        type: string
      worker_url:
        description: 'Reserved for future AlphaDog status callback; not used by this JSON producer'
        required: false
        type: string

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: alphadog-prizepicks-scraper-${{ github.event.inputs.dispatch_id || github.event.inputs.request_id || github.event.client_payload.dispatch_id || github.event.client_payload.request_id || github.run_id }}
  cancel-in-progress: false

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: python -m pip install --upgrade pip curl_cffi requests

      - name: Produce PrizePicks MLB JSON
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
          GITHUB_DISPATCH_ID: ${{ github.event.inputs.dispatch_id || github.event.inputs.request_id || github.event.client_payload.dispatch_id || github.event.client_payload.request_id }}
          ALPHADOG_DISPATCH_ID: ${{ github.event.inputs.dispatch_id || github.event.inputs.request_id || github.event.client_payload.dispatch_id || github.event.client_payload.request_id }}
          DISPATCH_ID: ${{ github.event.inputs.dispatch_id || github.event.inputs.request_id || github.event.client_payload.dispatch_id || github.event.client_payload.request_id }}
          ALPHADOG_REQUEST_ID: ${{ github.event.inputs.request_id || github.event.inputs.dispatch_id || github.event.client_payload.request_id || github.event.client_payload.dispatch_id }}
          ALPHADOG_CHAIN_ID: ${{ github.event.inputs.chain_id || github.event.client_payload.chain_id }}
          ALPHADOG_SLATE_DATE: ${{ github.event.inputs.slate_date || github.event.client_payload.slate_date }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
        run: python main.py

      - name: Commit board JSON to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prizepicks_mlb_current.json prizepicks_mlb_current_meta.json
          if git diff --cached --quiet; then
            echo "No PrizePicks JSON changes to commit."
            exit 0
          fi
          git commit -m "Update PrizePicks MLB current board JSON [skip ci]"
          git push origin HEAD:main
